<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar-se | Seu Estoquista</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50:  '#fff1ee',
                            100: '#ffe0d8',
                            200: '#ffc2b3',
                            300: '#ff9d85',
                            400: '#ff6b47',
                            500: '#ff2d20',
                            600: '#e0210f',
                            700: '#b8190b',
                            800: '#8f150c',
                            900: '#75140e',
                        },
                        ink: {
                            900: '#14161c',
                        },
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Mantido para eventuais customizações adicionais do projeto -->
    <link rel="stylesheet" th:href="@{/css/CssRegistro.css}">

    <style>
        body { font-family: 'Nunito', ui-sans-serif, system-ui, sans-serif; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-50 px-6 py-10 antialiased">

    <div class="w-full max-w-md">

        <!-- Logo / marca -->
        <div class="flex flex-col items-center mb-8">
            <span class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-brand-500 text-white font-extrabold text-lg mb-3 shadow-sm">SE</span>
            <span class="text-lg font-extrabold text-ink-900 tracking-tight">Seu Estoquista</span>
        </div>

        <div class="formRegistro bg-white border border-gray-100 rounded-2xl shadow-[0_1px_2px_rgba(16,24,40,0.04),0_8px_24px_rgba(16,24,40,0.06)] px-8 py-10">
            <h2 class="text-xl font-extrabold text-ink-900 tracking-tight mb-1 text-center">Criar sua conta</h2>
            <p class="text-sm text-gray-500 text-center mb-8">Comece a controlar seu estoque agora mesmo</p>

            <form th:action="@{/registro}" method="POST" th:object="${usuario}" class="space-y-5">

                <div class="campo">
                    <label for="nome" class="block text-sm font-semibold text-gray-700 mb-1.5">Nome Completo:</label>
                    <input type="text" id="nome" th:field="*{nome}" placeholder="Digite seu nome completo" required
                        class="w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-400/40 focus:border-brand-400 transition-all">
                </div>

                <div class="campo">
                    <label for="telefone" class="block text-sm font-semibold text-gray-700 mb-1.5">Telefone:</label>
                    <input type="text" id="telefone" th:field="*{telefone}" placeholder="Digite seu telefone" required
                        class="w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-400/40 focus:border-brand-400 transition-all">
                </div>

                <div class="campo">
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">E-mail:</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="Digite seu e-mail" required
                        class="w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-400/40 focus:border-brand-400 transition-all">
                </div>

                <div class="campo">
                    <label for="senha" class="block text-sm font-semibold text-gray-700 mb-1.5">Senha:</label>
                    <input type="password" id="senha" th:field="*{senha}" placeholder="Digite sua senha" required
                        class="w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-400/40 focus:border-brand-400 transition-all">
                </div>

                <div class="acao pt-2">
                    <button type="submit"
                        class="w-full inline-flex items-center justify-center gap-2 text-sm font-semibold px-6 py-3 rounded-lg bg-brand-500 text-white shadow-sm hover:bg-brand-600 hover:shadow-md active:scale-[0.98] transition-all">
                        Registrar
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                        </svg>
                    </button>
                </div>

                <p class="text-center text-sm text-gray-500 pt-2">
                    Já possui conta?
                    <a th:href="@{/login}" class="font-semibold text-brand-600 hover:text-brand-700 hover:underline">
                        Entrar
                    </a>
                </p>

            </form>

        </div>
    </div>

</body>

</html>
